# ── Server ──────────────────────────────────────────────
server.port=8083
spring.application.name=lesson-service

# ── DataSource (MySQL) ───────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/edulearn_lesson?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Jaiho123@@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT (must match auth-service) ────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# ── Inter-service URLs ───────────────────────────────────
app.auth-service.url=http://localhost:8081
app.course-service.url=http://localhost:8082

# ── Actuator ─────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Swagger ──────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Logging ──────────────────────────────────────────────
logging.level.com.edulearn=DEBUG
