version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: edulearn-lesson-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: edulearn_lesson
    ports:
      - "3308:3306"
    volumes:
      - lesson_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  lesson-service:
    build: .
    container_name: edulearn-lesson-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/edulearn_lesson?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      APP_COURSE_SERVICE_URL: http://course-service:8082
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  lesson_mysql_data:
