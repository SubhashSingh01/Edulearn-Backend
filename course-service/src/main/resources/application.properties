# ── Server ──────────────────────────────────────────────
server.port=8082
spring.application.name=course-service

# ── DataSource (MySQL) ───────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/edulearn_course?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Jaiho123@@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT (must match auth-service secret exactly) ─────────
app.jwt.secret=ZWR1bGVhcm5TZWNyZXRLZXlGb3JKV1QyMDI0UHJvZHVjdGlvblVzZU9ubHk=
app.jwt.expiration-ms=86400000

# ── Inter-service URLs ───────────────────────────────────
app.auth-service.url=http://localhost:8081

# ── Actuator ─────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Swagger / OpenAPI ────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Logging ──────────────────────────────────────────────
logging.level.com.edulearn=DEBUG
logging.level.org.springframework.security=INFO
