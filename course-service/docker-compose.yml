version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: edulearn-course-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: edulearn_course
    ports:
      - "3307:3306"
    volumes:
      - course_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  course-service:
    build: .
    container_name: edulearn-course-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/edulearn_course?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      APP_AUTH_SERVICE_URL: http://auth-service:8081
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  course_mysql_data:
