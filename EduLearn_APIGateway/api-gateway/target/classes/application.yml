server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # ── Global CORS ──────────────────────────────────────────────────────────
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      # ── Default filters applied to every route ───────────────────────────────
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      # ── Routes ───────────────────────────────────────────────────────────────
      routes:

        # ── Auth Service (port 8081) ──────────────────────────────────────────
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**

        # ── Course Service (port 8082) ────────────────────────────────────────
        - id: course-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/courses/**
          filters:
            - name: AuthFilter

        # ── Lesson Service (port 8083) ────────────────────────────────────────
        - id: lesson-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/lessons/**
          filters:
            - name: AuthFilter

        # ── Enrollment Service (port 8084) ────────────────────────────────────
        - id: enrollment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/enrollments/**
          filters:
            - name: AuthFilter

        # ── Payment Service (port 8085) ───────────────────────────────────────
        - id: payment-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - name: AuthFilter

        # ── Progress Service (port 8086) ──────────────────────────────────────
        - id: progress-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/progress/**,/api/v1/certificates/**
          filters:
            - name: AuthFilter

        # ── Assessment Service (port 8087) ────────────────────────────────────
        - id: assessment-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/quizzes/**,/api/v1/questions/**,/api/v1/attempts/**
          filters:
            - name: AuthFilter

        # ── Discussion Service (port 8088) ────────────────────────────────────
        - id: discussion-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/threads/**,/api/v1/replies/**
          filters:
            - name: AuthFilter

        # ── Notification Service (port 8089) ──────────────────────────────────
        - id: notification-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - name: AuthFilter

# ── JWT (must match all services) ─────────────────────────────────────────────
app:
  jwt:
    secret: ZWR1bGVhcm5TZWNyZXRLZXlGb3JKV1QyMDI0UHJvZHVjdGlvblVzZU9ubHk=

  # Public endpoints — skip JWT check
  public-endpoints:
    - /api/v1/auth/register
    - /api/v1/auth/login
    - /api/v1/auth/refresh
    - /api/v1/auth/validate
    - /api/v1/auth/oauth/success
    - /api/v1/courses
    - /api/v1/courses/search
    - /api/v1/courses/featured
    - /api/v1/courses/top
    - /api/v1/courses/free
    - /api/v1/certificates/verify
    - /actuator/health

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.edulearn.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
    reactor.netty: INFO
