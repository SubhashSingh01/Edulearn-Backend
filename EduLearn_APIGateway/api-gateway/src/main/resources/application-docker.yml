server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://frontend:80"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/**

        - id: course-service
          uri: http://course-service:8082
          predicates:
            - Path=/api/v1/courses/**
          filters:
            - name: AuthFilter

        - id: lesson-service
          uri: http://lesson-service:8083
          predicates:
            - Path=/api/v1/lessons/**
          filters:
            - name: AuthFilter

        - id: enrollment-service
          uri: http://enrollment-service:8084
          predicates:
            - Path=/api/v1/enrollments/**
          filters:
            - name: AuthFilter

        - id: payment-service
          uri: http://payment-service:8085
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - name: AuthFilter

        - id: progress-service
          uri: http://progress-service:8086
          predicates:
            - Path=/api/v1/progress/**,/api/v1/certificates/**
          filters:
            - name: AuthFilter

        - id: assessment-service
          uri: http://assessment-service:8087
          predicates:
            - Path=/api/v1/quizzes/**,/api/v1/questions/**,/api/v1/attempts/**
          filters:
            - name: AuthFilter

        - id: discussion-service
          uri: http://discussion-service:8088
          predicates:
            - Path=/api/v1/threads/**,/api/v1/replies/**
          filters:
            - name: AuthFilter

        - id: notification-service
          uri: http://notification-service:8089
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - name: AuthFilter

app:
  jwt:
    secret: ZWR1bGVhcm5TZWNyZXRLZXlGb3JKV1QyMDI0UHJvZHVjdGlvblVzZU9ubHk=
  public-endpoints:
    - /api/v1/auth/register
    - /api/v1/auth/login
    - /api/v1/auth/refresh
    - /api/v1/auth/validate
    - /api/v1/auth/oauth/success
    - /api/v1/courses
    - /api/v1/courses/search
    - /api/v1/courses/featured
    - /api/v1/courses/top
    - /api/v1/courses/free
    - /api/v1/certificates/verify
    - /actuator/health

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

logging:
  level:
    com.edulearn.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
